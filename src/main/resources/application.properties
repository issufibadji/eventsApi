spring.application.name=api

# Banco de dados — padrão aponta para o PostgreSQL local (sem Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eventostec}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# AWS S3 — só usado quando storage.type=s3
aws.region=${AWS_REGION:us-east-1}
aws.bucket.name=${AWS_BUCKET_NAME:eventostec-imagens}
aws.accessKey=
aws.secretKey=

admin.key=${ADMIN_KEY:admin}
server.port=8090
