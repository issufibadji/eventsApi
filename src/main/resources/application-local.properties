# -------------------------------------------------------
# Profile LOCAL — roda sem Docker e sem AWS S3
# Ativar com: mvn spring-boot:run -Dspring-boot.run.profiles=local
# -------------------------------------------------------

# H2 in-memory no modo de compatibilidade PostgreSQL
spring.datasource.url=jdbc:h2:mem:eventostec;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Cria/derruba o schema via Hibernate (as migrations usam pgcrypto, incompatível com H2)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Console web do H2: http://localhost:8090/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Usa LocalStorageService (sem upload real)
storage.type=local
